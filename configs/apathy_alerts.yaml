# Apathy Bleed monitoring (read-only). Thresholds are adverse move fractions for SHORT legs:
# adverse_move = (mark_price - entry_price) / entry_price

hold_days: 150
warning_threshold_pct: 0.45
critical_threshold_pct: 0.55
stop_threshold_pct: 0.60

exit_reminder_days: [7, 3, 1]
# Fire when (today - max OPEN entry_date) equals one of these (UTC calendar days).
scan_reminder_milestone_days: [40, 43, 45]
formation_window_days: 45

price_check_interval_minutes: 60
# Exit reminders + scanner: once per UTC day in this hour (first five minutes).
daily_bundle_utc_hour: 8
# Variational portfolio summary to Telegram (once per UTC day in this hour; first five minutes).
portfolio_snapshot_utc_hour: 8

# Variational public stats (GET, no auth). Must match operational endpoint.
variational:
  base_url: "https://omni-client-api.prod.ap-northeast-1.variational.io"
  stats_path: "/metadata/stats"
  timeout_seconds: 20

# Absolute paths under the curated data lake. On Render this is /data/curated/data_lake/
# (the persistent disk, monitored by the nightly Drive directory sync). Locally this
# is <repo>/data/curated/data_lake/ if present.
#
# NOTE: These paths MUST live inside /data/curated/data_lake/ so the Drive sync backs
# them up. A previous version used /data/* (one level up), which routed writes outside
# the sync directory and left the Apathy trade book, alert log, and state JSON files
# unbacked up despite daily pipeline cycles. See ARCHITECTURE.md "Apathy Bleed trade
# book" section. Follow-up: ideally these would resolve via repo_paths.data_lake_root()
# like other lake writers; see config_loader._p().
paths:
  book_csv: "/data/curated/data_lake/apathy_bleed_book.csv"
  alert_log_csv: "/data/curated/data_lake/apathy_alert_log.csv"
  stop_proximity_state_json: "/data/curated/data_lake/apathy_stop_proximity_state.json"
  exit_reminder_state_json: "/data/curated/data_lake/apathy_exit_reminder_state.json"
  scanner_reminder_state_json: "/data/curated/data_lake/apathy_scanner_reminder_state.json"
  daily_snapshot_state_json: "/data/curated/data_lake/apathy_daily_snapshot_state.json"
  daily_bundle_state_json: "/data/curated/data_lake/apathy_daily_bundle_state.json"
