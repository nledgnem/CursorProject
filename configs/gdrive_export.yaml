export_gdrive:
  enabled: true

  # Persistent base on Render
  base_dir: "/data"

  # Sync everything inside the curated data lake (auto-picks up new tables).
  # Patterns: parquet (bronze/silver tables), csv (books/logs/exports), json
  # (runner state files for apathy_*_state.json, danlongshort_*_state.json).
  # State JSONs are needed in Drive for off-Render replay/debugging; without
  # them, restoring runner state on a new container loses all dedup history
  # and would re-fire every alert at first boot.
  sync_directory: "/data/curated/data_lake"
  sync_patterns: ["*.parquet", "*.csv", "*.json"]

  sources:
    silver_fact_price_parquet: "/data/curated/data_lake/silver_fact_price.parquet"
    fact_markets_snapshot_parquet: "/data/curated/data_lake/fact_markets_snapshot.parquet"
    universe_eligibility_parquet: "/data/universe_eligibility.parquet"
    single_coin_panel_csv: "/data/single_coin_panel.csv"
    msm_timeseries_csv: "/data/exports/msm_timeseries.csv"
    stablecoins_csv: "/data/stablecoins.csv"
    # Canonical context docs (repo-relative; resolved against repo_root by nightly_export.run()).
    # These are the single source of truth in the repo. Render's nightly export overwrites
    # the Drive copies in place (preserving file ID); Drive UI edits will be lost on next sync.
    data_dictionary_yaml: "data_dictionary.yaml"
    data_lake_context_md: "docs/DATA_LAKE_CONTEXT.md"
    strategies_md: "docs/STRATEGIES.md"
    backtest_md: "docs/BACKTEST.md"

  # Used to produce the stable MSM snapshot after each pipeline run.
  msm_reports_root: "reports/msm_funding_v0"

  gdrive:
    target_folder_id: "1-bi-bItWYKd2Df6KCMacCgFcqyKHKyoo"
    overwrite: true

    # Static filenames so downstream always reads “latest”
    filenames:
      silver_fact_price_parquet: "silver_fact_price.parquet"
      fact_markets_snapshot_parquet: "fact_markets_snapshot.parquet"
      universe_eligibility_parquet: "universe_eligibility.parquet"
      single_coin_panel_csv: "single_coin_panel.csv"
      msm_timeseries_csv: "msm_timeseries.csv"
      stablecoins_csv: "stablecoins.csv"
      data_dictionary_yaml: "data_dictionary.yaml"
      data_lake_context_md: "DATA_LAKE_CONTEXT.md"
      strategies_md: "STRATEGIES.md"
      backtest_md: "BACKTEST.md"

  retry:
    max_attempts: 5
    initial_backoff_seconds: 5
    max_backoff_seconds: 120
    backoff_multiplier: 2.0
    jitter: true
