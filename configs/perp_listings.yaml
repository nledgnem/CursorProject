hyperliquid:
  base_url: "https://api.hyperliquid.xyz"
  timeout_seconds: 20
  # Hyperliquid /info POST payload for perp metadata
  meta_payload:
    type: "meta"

variational:
  base_url: "https://omni-client-api.prod.ap-northeast-1.variational.io"
  timeout_seconds: 20
  stats_path: "/metadata/stats"

ticker_normalization:
  # Applied when matching venue tickers -> panel tickers (case-insensitive).
  strip_suffixes:
    - "-PERP"
    - "PERP"
    - "/USD"
    - "/USDT"
    - "-USD"
    - "-USDT"
    - "USD"
    - "USDT"
  strip_prefixes: []

output:
  # NOTE: Intentionally no `curated_data_lake_dir` override. When absent,
  # load_perp_listings_config() falls through to repo_paths.data_lake_root(),
  # which honors the RENDER_DATA_LAKE_PATH env var (-> /data/curated/data_lake
  # on Render). Setting a relative string here bypasses the resolver and
  # writes to ephemeral container storage on Render, invisible to the nightly
  # Drive sync. See ARCHITECTURE.md "Perp listings snapshots" section.
  perps_hyperliquid_csv: "perps_hyperliquid.csv"
  perps_variational_csv: "perps_variational.csv"
  perp_ticker_mapping_csv: "perp_ticker_mapping.csv"
  perp_coverage_summary_csv: "perp_coverage_summary.csv"
