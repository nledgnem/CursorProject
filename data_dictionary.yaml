# Master Data Dictionary: MSM Funding Pipeline + Curated Price Panels
# Machine-readable source of truth for column semantics.

layers:
  bronze:
    description: "Raw data ingestion layer."
    columns:
      - name: funding_rate_raw_pct
        type: float
        unit: decimal  # Example: 0.000186 means 0.0186% per 8-hours
        frequency: 8-hour
        source: coinglass_api

  silver:
    description: "Cleaned and standardized layer."
    columns:
      - name: funding_rate_raw_pct
        type: float
        unit: decimal  # Example: 0.000186 means 0.0186% per 8-hours
        frequency: 8-hour
        transformation: "Bronze column funding_rate renamed to funding_rate_raw_pct. Temporal harmonization applied due to an upstream unit shift (cutover 2026-01-13 UTC): before cutover values treated as decimals; at/after cutover values are divided by 100 to convert percent-units into decimals."

  gold:
    description: "Feature engineering and strategy engine layer."
    columns:
      - name: F_tk_apr_dec
        type: float
        unit: decimal # Example: 0.04 (representing 4.0% APR)
        frequency: annualized
        pipeline_column: "F_tk_apr"  # msm_timeseries.csv: decimal APR (not percentage points)
      - name: Environment_APR
        type: float
        unit: percentage_points  # Example: 4.0 means 4% APR (stored as pct-points)
        frequency: decision_date (weekly decision points)
        definition: "Weekly Environment_APR derived from the macro environment sensor; stored in percentage points so it can be compared directly to APR thresholds like 2.0 / 5.0 / 15.0."
      - name: Fragmentation_Spread
        type: float
        unit: decimal_raw  # Example: 0.000075 means 7.5e-5 (a pure decimal fraction; no percent scaling)
        frequency: decision_date (weekly decision points)
        definition: "Cross-sectional funding-rate spread (q75 - q25) computed from native 8-hour funding rates across the altcoin basket; values are stored as raw decimals (no % multipliers/dividers)."

prices_daily:
  # DEPRECATED: this top-level block is retained for backward compatibility only.
  # Authoritative definitions for daily price/mcap/volume now live under the
  # per-table entries fact_price / fact_marketcap / fact_volume below.
  close:
    dtype: float64
    unit: USD
    definition: "See fact_price for authoritative definition."
  volume:
    dtype: float64
    unit: USD
    definition: "See fact_volume for authoritative definition (rolling 24h, not calendar-day bar)."
  date:
    frequency: Daily
    definition: "See fact_price / fact_marketcap / fact_volume."

# ------------------------------------------------------------------------------
# Data source tier limitations (applies across bronze fact tables)
# ------------------------------------------------------------------------------
data_sources:
  coingecko:
    current_tier: Basic
    api_history_depth_days: 730  # 2 years from the /coins/{id}/market_chart/range endpoint
    rate_limit_per_min: 30  # with exponential backoff on 429
    notes: >
      On current Basic tier, backfills reach back at most ~2 years. Pre-2024 rows
      present in fact_price / fact_marketcap / fact_volume were fetched during a
      brief Analyst-tier window and have known (but unquantified) quality issues.
      Treat pre-2024 data as suspect and verify independently before relying on it.
      New backfills cannot reproduce pre-2024 data on the current tier.

      [2026-04-29 P0] download_all_coins writer-race in
      src/providers/coingecko.py:291-308. Fetcher iterates data/perp_allowlist.csv
      row-by-row, calls /coins/{id}/market_chart/range with the row's coingecko_id,
      and stores results in a dict keyed by row's symbol. The allowlist contains
      280 duplicate-symbol rows (139 distinct symbols) where each row has the
      canonical CoinGecko slug plus 1-18 bridged/wrapped/staked variants
      (ETH x4, USDT x19, SOL x5, DOGE x3, SHIB x3, ZEC x3, etc.). For these
      symbols the last-iterated variant wins and earlier results are silently
      overwritten. Empirical impact on fact_marketcap 2026-04-25: ETH ~$41M
      (real ~$250B, off ~5000x), SOL ~$95M (real ~$60B, off ~700x), DOGE ~120x
      off, USDT absent, ~135 others affected. fact_price and fact_volume are
      affected on the same set of symbols. fact_markets_snapshot is NOT affected
      (different ingestion path -- paginated /coins/markets). Until fixed:
      prefer fact_markets_snapshot for blue-chip mcap/rank; do not trust
      per-symbol joins on fact_marketcap / fact_price / fact_volume for any
      symbol with bridged variants in the allowlist. Single-variant symbols
      (BTC, BNB, XRP, TAO, DASH, etc.) are correct. Detail and impact table
      in reports/apathy_universe_cut_audit_2026_04_29.md section 4. Dedicated
      fix task: coingecko-data-integrity-fix-2026-04-29 (queued).

      [2026-04-29] dim_asset.coingecko_id is a structural placeholder: all
      2,717 rows have coingecko_id == lowercase(symbol). Zero rows carry real
      CoinGecko slugs. Daily ingestion does NOT use this column, so dormant;
      any analysis joining via dim_asset.coingecko_id is silently wrong.
      The fact_price.asset_id column definition below ("Canonical CoinGecko
      slug ... Matches dim_asset.coingecko_id") is documentation drift -- to
      be corrected as part of the dedicated fix task.
  coinglass:
    current_tier: Hobbyist
    rate_limit_per_min: 30  # with 2.2s spacing between calls
    oi_history_cap_days: 334  # /futures/open-interest/aggregated-history on Hobbyist
    unit_cutover_utc: 2026-01-13  # funding_rate units shifted from decimal to percent
    notes: >
      Funding: bronze fact_funding mixes pre- and post-cutover units; silver_fact_funding
      resolves this to uniform decimal form.

      OI: /futures/open-interest/aggregated-history is capped at ~334 days per symbol on
      Hobbyist regardless of requested --start-date; backfills beyond that return the
      cap's worth of data. Most altcoins therefore start ~2025-05; BTC starts 2025-02-14.

      Liquidations: /futures/liquidation/aggregated-history does NOT share the ~334-day
      OI cap on Hobbyist. Empirically serves back to 2024-01-01 cleanly (verified
      2026-04-23 backfill: 593 assets, 2024-01-01 onward). The per-source cap field
      above (oi_history_cap_days) is OI-specific -- do not generalize to other endpoints.

      Ingestion cleaning: the liquidations endpoint pads pre-listing / pre-coverage
      dates with (0, 0) synthetic rows. scripts/fetch_coinglass_data.py trims leading
      zero-pad rows per asset at fetch time so bronze fact_liquidations has a
      first-row-nonzero guarantee. Interior zero days (real quiet days) are preserved.
      OI fetcher does NOT currently apply the same trim -- pre-listing zero-pad behavior
      on the OI endpoint has not been audited; flagged as a follow-up.

# ------------------------------------------------------------------------------
# Bronze fact tables (CoinGecko daily panels)
# ------------------------------------------------------------------------------
fact_price:
  description: >
    Daily USD close price per asset, sourced from CoinGecko /coins/{id}/market_chart/range.
    Pre-2024 rows exist from a prior Analyst-tier fetch and are suspect; post-2024-01-01
    rows are from the current Basic tier and trustworthy within the last 730-day window.
  path: data/curated/data_lake/fact_price.parquet
  source: coingecko
  frequency: daily  # UTC calendar day
  coverage:
    earliest_date_in_lake: 2013-04  # suspect quality
    trustworthy_from: 2024-01-01
    api_reachable_window_days: 730
  columns:
    - name: asset_id
      type: string
      definition: "Canonical CoinGecko slug (e.g. 'bitcoin', 'ethereum', 'aria-ai'). Matches dim_asset.coingecko_id."
    - name: date
      type: date
      unit: UTC_calendar_day
      frequency: daily
    - name: close
      type: float
      unit: USD_per_coin
      frequency: daily
      source: coingecko
      definition: "Closing USD price at 00:00 UTC of the named date."
    - name: source
      type: string
      definition: "Provider tag; 'coingecko' for all rows."

fact_marketcap:
  description: >
    Daily USD market cap per asset, sourced from CoinGecko /coins/{id}/market_chart/range.
    Same coverage + quality caveats as fact_price.
  path: data/curated/data_lake/fact_marketcap.parquet
  source: coingecko
  frequency: daily
  coverage:
    earliest_date_in_lake: 2013-04  # suspect quality
    trustworthy_from: 2024-01-01
    api_reachable_window_days: 730
  columns:
    - name: asset_id
      type: string
      definition: "Canonical CoinGecko slug."
    - name: date
      type: date
      unit: UTC_calendar_day
      frequency: daily
    - name: marketcap
      type: float
      unit: USD
      frequency: daily
      source: coingecko
      definition: "Market cap at 00:00 UTC of the named date."
    - name: source
      type: string
      definition: "Provider tag; 'coingecko' for all rows."

fact_volume:
  description: >
    Daily trading volume per asset, sourced from CoinGecko /coins/{id}/market_chart/range.
    IMPORTANT: stored value is rolling 24h quote volume AT SNAPSHOT TIME, not a calendar-day bar.
    This matters for any resampling or diff-based feature: successive rows overlap by 23h.
    Cross-sectional comparison on a single date is fine; time-series arithmetic requires care.
    Same coverage + quality caveats as fact_price.
  path: data/curated/data_lake/fact_volume.parquet
  source: coingecko
  frequency: daily_snapshot_of_rolling_24h  # NOT calendar-day bar
  coverage:
    earliest_date_in_lake: 2013-12  # suspect quality
    trustworthy_from: 2024-01-01
    api_reachable_window_days: 730
  columns:
    - name: asset_id
      type: string
      definition: "Canonical CoinGecko slug."
    - name: date
      type: date
      unit: UTC_calendar_day
      frequency: daily
      definition: "The date the rolling-24h volume was observed."
    - name: volume
      type: float
      unit: USD
      frequency: rolling_24h  # NOT calendar-day bar
      source: coingecko
      definition: "Rolling 24-hour USD quote volume at snapshot time on the named date."
    - name: source
      type: string
      definition: "Provider tag; 'coingecko' for all rows."

fact_funding:
  description: >
    Daily funding rate per (asset, instrument, exchange) from CoinGlass.
    IMPORTANT: mixed units across the 2026-01-13 cutover. Before cutover, funding_rate
    is a decimal fraction (e.g. 0.0001 = 0.01%/8h). After cutover, it is in percent
    (0.01 = 0.01%/8h). Analysis code should use silver_fact_funding, which normalizes
    this to uniform decimal form.
  path: data/curated/data_lake/fact_funding.parquet
  source: coinglass
  frequency: daily  # one row per day per (asset, instrument, exchange)
  coverage:
    earliest_date_in_lake: 2023-04
    unit_cutover_utc: 2026-01-13
  columns:
    - name: asset_id
      type: string
      definition: "Canonical base asset symbol (e.g. BTC, ETH). Matches fact_open_interest.asset_id."
    - name: instrument_id
      type: string
      nullable: true
      definition: "Joins to dim_instrument; nullable when mapping is incomplete."
    - name: date
      type: date
      unit: UTC_calendar_day
      frequency: daily
    - name: funding_rate
      type: float
      unit: mixed  # see description and transformation
      frequency: daily  # last 8h observation of the UTC day
      source: coinglass
      definition: >
        Mixed-unit raw funding rate. Pre-2026-01-13 = decimal fraction per 8 hours.
        Post-2026-01-13 = percent per 8 hours. Use silver_fact_funding for analysis.
    - name: exchange
      type: string
      definition: "Exchange name (e.g. 'Binance')."
    - name: source
      type: string
      definition: "Provider tag; 'coinglass' for all rows."

Live_State_Database:
  engine: SQLite
  file: macro_state.db
  primary_table: macro_features
  primary_key: decision_date (Must be strictly indexed for fast UPSERTs and UI reads)
  write_protocol: UPSERT only. Destructive overwrites are forbidden.

System_Time:
  timezone: UTC
  cron_offsets: +5 minutes past the 8-hour epoch (e.g., 08:05) to ensure exchange API settlement.

# ------------------------------------------------------------------------------
# Apathy Bleed (pair trade book + read-only monitoring)
# All paths under data/curated/data_lake/ unless noted. UTC calendar dates for *_date_utc columns.
# ------------------------------------------------------------------------------
Apathy_Bleed:
  description: >
    Manual trade ledger for Long BTC / Short alt (Apathy Bleed). The book CSV is the source of truth;
    there is no execution API. Monitoring joins the book to Variational public GET /metadata/stats mark prices.
  config_file:
    path: configs/apathy_alerts.yaml
    definition: "Thresholds (warning/critical/stop fractions, hold_days, scan milestones, Variational URL); strategy parameters are not hardcoded in Python."

  apathy_bleed_book_csv:
    path: data/curated/data_lake/apathy_bleed_book.csv
    write_protocol: >
      Append new legs; closing a trade rewrites the matching row in place (status, exit fields, PnL).
      Rows are never deleted (append-only audit of lifecycle).
    columns:
      - name: trade_id
        type: string
        unit: uuid
        definition: "Unique row identifier."
      - name: cohort
        type: string
        definition: "Cohort label (e.g. C1, C2, TEST)."
      - name: ticker
        type: string
        definition: "Base symbol as used for Variational mark lookup (e.g. ZEC, BTC for LONG_BTC leg)."
      - name: side
        type: string
        definition: "SHORT (alt leg) or LONG_BTC (hedge)."
      - name: entry_date_utc
        type: date
        unit: UTC_calendar_day
      - name: entry_price_usd
        type: float
        unit: USD_per_coin
      - name: notional_usd
        type: float
        unit: USD
        definition: "Notional sized at entry (short leg notional; LONG_BTC row matches sum of cohort short notionals at hedge time)."
      - name: quantity
        type: float
        unit: coins
        definition: "notional_usd / entry_price_usd."
      - name: stop_price_usd
        type: float
        unit: USD_per_coin
        definition: "SHORT legs: entry_price_usd * 1.60. LONG_BTC may be blank."
      - name: exit_date_target_utc
        type: date
        unit: UTC_calendar_day
        definition: "entry_date_utc + hold_days (default from config)."
      - name: status
        type: string
        definition: "OPEN | CLOSED_EXPIRY | CLOSED_STOP | CLOSED_MANUAL."
      - name: exit_date_utc
        type: date
        unit: UTC_calendar_day
        nullable: true
      - name: exit_price_usd
        type: float
        unit: USD_per_coin
        nullable: true
      - name: pnl_usd
        type: float
        unit: USD
        nullable: true
        definition: "pnl_pct * notional_usd at close."
      - name: pnl_pct
        type: float
        unit: decimal_fraction
        nullable: true
        definition: "SHORT: (entry - exit) / entry. LONG_BTC: (exit - entry) / entry."
      - name: notes
        type: string
        nullable: true

  apathy_alert_log_csv:
    path: data/curated/data_lake/apathy_alert_log.csv
    write_protocol: "Append-only audit of Telegram alerts emitted by scripts/apathy_alert_runner.py."
    columns:
      - name: timestamp_utc
        type: string
        definition: "ISO-8601 UTC from datetime.now(timezone.utc)."
      - name: alert_type
        type: string
      - name: trade_id
        type: string
        nullable: true
      - name: cohort
        type: string
        nullable: true
      - name: ticker
        type: string
        nullable: true
      - name: dedup_bucket
        type: string
        definition: "Key used for de-duplication (e.g. UTC hour + tier, or snapshot day)."
      - name: message
        type: string
        definition: "Single-line text copy of alert body."

  apathy_monitoring_state_json:
    description: "Small JSON sidecars for deduplication and daily bundle bookkeeping (not human trade data)."
    files:
      - path: data/curated/data_lake/apathy_stop_proximity_state.json
        definition: "Last adverse tier per OPEN short trade_id; hourly per-tier send markers."
      - path: data/curated/data_lake/apathy_exit_reminder_state.json
        definition: "Keys for exit-date reminders already sent."
      - path: data/curated/data_lake/apathy_scanner_reminder_state.json
        definition: "Scanner milestone sends per UTC day."
      - path: data/curated/data_lake/apathy_daily_snapshot_state.json
        definition: "Last daily snapshot UTC day."
      - path: data/curated/data_lake/apathy_daily_bundle_state.json
        definition: "Last UTC day the 08:00 bundle (exit + scanner + snapshot) ran."

# ------------------------------------------------------------------------------
# CoinGlass open interest (bronze fact table)
# ------------------------------------------------------------------------------
fact_open_interest:
  description: >
    Daily aggregated open interest per base asset, cross-exchange aggregated by
    CoinGlass. Covers the Binance-perp universe (~590 altcoins + BTC) after the
    2026-04-22 universe-expansion backfill. History depth is capped by CoinGlass
    Hobbyist tier at ~334 days per symbol: BTC goes back to 2025-02-14, most
    alts to ~2025-05, newer listings only from their listing date forward.
    Multi-year OI backtests are not feasible on this tier.
  path: data/curated/data_lake/fact_open_interest.parquet
  source: coinglass
  frequency: daily
  coverage:
    universe: Binance-perp (via dim_instrument filtered to venue=binance, instrument_type=perpetual)
    assets_approx: 590
    start_btc: 2025-02-14
    start_alts_typical: 2025-05-24
    history_cap_days: 334  # CoinGlass Hobbyist tier constraint on aggregated-history endpoint
  columns:
    - name: asset_id
      type: string
      definition: "Canonical base asset symbol (e.g. BTC, ETH). Matches fact_funding.asset_id and dim_asset.asset_id."
    - name: date
      type: date
      unit: UTC_calendar_day
      frequency: daily
    - name: open_interest_usd
      type: float
      unit: USD
      frequency: daily
      source: coinglass
      definition: >
        Cross-exchange aggregated open interest at end-of-day (UTC), derived from
        CoinGlass /futures/open-interest/aggregated-history 8h OHLC candles by
        taking the last close of each UTC day.
    - name: source
      type: string
      definition: "Provider tag; always 'coinglass' for this table."

# ------------------------------------------------------------------------------
# CoinGlass liquidations (bronze fact table). Added 2026-04-23.
# ------------------------------------------------------------------------------
fact_liquidations:
  description: >
    Daily long and short liquidation volumes per base asset, cross-venue aggregated
    by CoinGlass across 10 major centralized perp exchanges (Binance, OKX, Bybit,
    Bitget, HTX, Gate, MEXC, Bitmex, Deribit, Kraken). Covers 593 assets over
    2024-01-01 to 2026-04-24 as of the 2026-04-23 backfill. Added 2026-04-23.
  path: data/curated/data_lake/fact_liquidations.parquet
  source: coinglass
  frequency: daily
  venue_coverage: >
    10 major centralized perp exchanges (Binance, OKX, Bybit, Bitget, HTX, Gate,
    MEXC, Bitmex, Deribit, Kraken).
  caveat: >
    Does NOT include Hyperliquid or Variational -- these venues don't report
    liquidations to CoinGlass in this feed. Apathy Bleed executes across
    Hyperliquid, Binance, and Variational, so this table reflects
    centralized-venue pressure only. Interpret as a proxy for global
    leverage-flush intensity, not a complete record of venue-specific pain.
  data_integrity_note: >
    CoinGlass zero-pads rows for pre-listing / pre-coverage dates in raw responses
    (synthetic (0, 0) rows). The ingestion fetcher trims leading zero-pad rows per
    asset before writing to bronze, so the first row per asset is guaranteed to
    have nonzero liquidation activity. Internal zero days (legitimate quiet days
    on an active perp) are preserved. See scripts/fetch_coinglass_data.py
    fetch_liquidation_history for trim implementation.
  coverage:
    universe: Binance-perp (same auto-resolution as fact_funding / fact_open_interest)
    assets: 593
    rows: 360505
    start_date: 2024-01-01
    end_date: 2026-04-24
    history_cap_observed: >
      No cap encountered -- Hobbyist tier serves full 2024-01-01 history for
      liquidations, in contrast to the ~334-day cap on the OI endpoint. Per-asset
      windows still vary by perp listing date across the 10-venue set (e.g., ARIA:
      2025-08-21 onward, DEXE: 2024-07-29 onward, PIEVERSE: 2025-11-14 onward).
      Verify if the CoinGlass tier changes.
  columns:
    - name: asset_id
      type: string
      definition: >
        Canonical base asset symbol, uppercase (e.g. BTC, ETH). Matches
        fact_open_interest.asset_id and fact_funding.asset_id.
    - name: date
      type: date
      unit: UTC_calendar_day
      frequency: daily
    - name: long_liquidation_usd
      type: float
      unit: USD
      frequency: daily
      source: coinglass
      definition: >
        Total USD value of long-position liquidations on the named UTC day,
        cross-venue aggregated across the 10 centralized perp exchanges listed
        in venue_coverage. Excludes Hyperliquid and Variational.
    - name: short_liquidation_usd
      type: float
      unit: USD
      frequency: daily
      source: coinglass
      definition: >
        Total USD value of short-position liquidations on the named UTC day,
        cross-venue aggregated across the 10 centralized perp exchanges listed
        in venue_coverage. Excludes Hyperliquid and Variational.
    - name: source
      type: string
      definition: "Provider tag; always 'coinglass' for this table."

# ------------------------------------------------------------------------------
# CoinGecko daily markets snapshot (bronze fact table)
# Supply columns used as inputs to Apathy Bleed Gate 1 (circulating/total ratio).
# ------------------------------------------------------------------------------
fact_markets_snapshot:
  description: >
    Daily per-coin market metadata from CoinGecko /coins/markets (~2500 coins per
    snapshot). Append-only with dedup on (asset_id, date). Started accumulating
    ~2026-01.
  path: data/curated/data_lake/fact_markets_snapshot.parquet
  source: coingecko
  frequency: daily
  coverage:
    earliest_date_in_lake: 2026-01
    coins_per_snapshot_approx: 2500
    write_protocol: append_with_dedup_on_asset_id_and_date
  supply_columns:
    - name: fully_diluted_valuation_usd
      type: float
      unit: USD
      frequency: daily
      source: coingecko
      nullable: true
      definition: >
        CoinGecko-reported FDV = current_price_usd * max_supply (with fallback to
        total_supply when max_supply is absent). As of 2026-04-22: ~100% coverage
        in top-300 by market_cap_rank; ~100% overall (1 null / 2500).
    - name: circulating_supply
      type: float
      unit: coins
      frequency: daily
      source: coingecko
      nullable: true
      definition: "Tokens in public circulation per CoinGecko. ~100% coverage in top-300 as of 2026-04-22."
    - name: total_supply
      type: float
      unit: coins
      frequency: daily
      source: coingecko
      nullable: true
      definition: "Total tokens issued (excluding burned) per CoinGecko. ~100% coverage overall as of 2026-04-22."
    - name: max_supply
      type: float
      unit: coins
      frequency: daily
      source: coingecko
      nullable: true
      definition: >
        Hard cap on token supply per CoinGecko. ~57% coverage in top-300 as of
        2026-04-22: many coins have no hard-coded maximum (inflationary or
        governance-controlled supply), so nulls are expected rather than a
        data-quality defect. Gate logic that needs "fully diluted" should
        fall back to total_supply when max_supply is null.

# ------------------------------------------------------------------------------
# CoinGecko derivative open interest (QUARANTINED / ORPHANED)
# Investigated 2026-04-27: not wired into the production pipeline.
# ------------------------------------------------------------------------------
fact_derivative_open_interest:
  status: QUARANTINED_ORPHANED
  description: >
    Stale artifact from an earlier ingestion workflow. Last refreshed 2026-01-28.
    Source script (scripts/fetch_derivative_data.py) is NOT wired into the
    current production pipeline (system_heartbeat.py -> live_data_fetcher.py ->
    run_live_pipeline.py does not invoke it). Different provider semantics from
    fact_open_interest (CoinGlass): different grain, different exchange
    aggregation rules, different OI definition.
  do_not_use:
    - reason: stale (last update 2026-01-28; ~3 months out of date)
    - reason: not refreshed by any production pipeline step
    - reason: different semantics from fact_open_interest -- not joinable on (asset_id, date)
  use_instead: fact_open_interest  # CoinGlass cross-exchange OI, refreshed daily
  path: data/curated/data_lake/fact_derivative_open_interest.parquet
  source: coingecko_derivatives_endpoint  # /derivatives (different from /coins/{id}/market_chart/range)
  followup: >
    Decide whether to (a) delete this file from the lake, or (b) revive the
    fetcher and wire it into Step 0 of run_live_pipeline.py. Tracked separately;
    Mads-flagged 2026-04-27.

# ------------------------------------------------------------------------------
# CoinGecko derivative exchange details (QUARANTINED / ORPHANED)
# Sibling table to fact_derivative_open_interest -- same orphan provenance.
# ------------------------------------------------------------------------------
fact_derivative_exchange_details:
  status: RESIDUE_PRODUCER_DECOMMISSIONED   # corrected 2026-04-28: producer was archived, not present in live tree
  description: >
    Daily snapshot of top centralized derivative exchanges (~20 venues) ranked
    by OI: Binance Futures, Bybit, CoinW, Gate, LBank, etc. Last refreshed
    2026-01-28; only one snapshot date present in the file.
    PRODUCER NOT IN THE LIVE TREE: scripts/fetch_derivative_data.py (the
    sibling fetcher that writes fact_derivative_volume / fact_derivative_open_interest
    / dim_derivative_exchanges) does NOT write this file. The only place in
    the repo that mentions fact_derivative_exchange_details is the archived
    scripts/archive/fetch_medium_priority_data.py, which Rule 8 forbids
    reading from at runtime. Treat as a frozen historical artifact whose
    producer has been pruned.
    NOT joinable with fact_open_interest -- different grain (per-exchange-per-day,
