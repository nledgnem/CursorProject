msm_timeseries:
  path: /data/exports/msm_timeseries.csv  # NOT under /data/curated/data_lake/, but mirrored to Drive via gdrive_export.yaml::sources
  source:
    builder: majors_alts_monitor/msm_funding_v0/msm_run.py + msm_outputs.py
  pipeline_step: "run_live_pipeline.py Step 4 (paused since 2024-12-30)"
  status: PAUSED   # strategy not running; file is the last good gold output
  primary_key: [decision_date]
  grain: weekly (Monday decision_date, next_date 7 days later)
  observed_2026_04_28:
    rows: 48
    date_range: "decision_date 2024-02-05 -> 2024-12-30 (last next_date 2024-12-31)"
    size_kb: 21.7
  schema_drift_note: |
    The CSV in Drive was last produced 2024-12-30 against an older code base.
    Current msm_outputs.py defines additional columns
    (F_tk_apr, Environment_APR, Fragmentation_Spread, Z_Score_90d, Delta_APR,
    LogModulus_APR, Conditioned_Momentum, w_risk) that would appear if the
    strategy were re-run today. The columns documented below are exactly the
    16 in the historical CSV.
  columns:
    - name: decision_date
      type: date
      unit: UTC_calendar_day
      definition: "Monday t_k -- weekly basket-formation decision."
    - name: next_date
      type: date
      unit: UTC_calendar_day
      definition: "Following Monday t_{k+1}. Realized return window is [decision_date, next_date]."
    - name: basket_hash
      type: string
      definition: |
        ",".join(sorted(asset_ids)) -- alphabetized member list used as a
        deterministic identity key for caching. NOT a cryptographic hash
        despite the name. Source: majors_alts_monitor/msm_funding_v0/msm_universe.py::get_universe_hash.
    - name: basket_members
      type: string
      definition: |
        ",".join(asset_ids) preserving the order from select_top_n_alts:
        TOP-N BY MARKETCAP DESCENDING. So basket_members[0] is the largest
        cap in the basket (typically XRP / STETH / ADA in the early period).
        Same set as basket_hash, different ordering.
    - name: n_valid
      type: int
      definition: |
        Number of assets in the basket with valid funding observations in the
        7-day lookback window prior to decision_date. Source:
        msm_feature.compute_7d_mean_funding.
    - name: coverage
      type: float
      unit: percent
      definition: |
        n_valid / target_basket_size * 100. Target = 30 in v0
        (verified empirically: n_valid=27 -> coverage=90.0).
    - name: F_tk
      type: float
      unit: decimal_8h_fraction
      definition: |
        Equal-weight basket feature. For each asset: mean of its 8h funding
        observations over [decision_date - 7d, decision_date - 1d]
        (PiT-safe, EXCLUSIVE of decision_date). Then mean across the basket.
        For multi-instrument-per-asset days, average by date first, then mean.
        Coverage rule: requires >=60% of basket assets to have valid funding,
        else None. Source: majors_alts_monitor/msm_funding_v0/msm_feature.py::compute_7d_mean_funding.
      gotchas:
        - "Pure-decimal 8h units (multiply by 1095*100 to express as APR percent)."
        - "Look-back is 7 calendar days, not 7 8h epochs."
    - name: label_v0_0
      type: string
      enum: [Red, Orange, Yellow, YellowGreen, Green]
      definition: |
        FULL_SAMPLE percentile-bin label for F_tk. Bins are computed across ALL
        weeks in the dataset using percentile cutpoints [0,20,40,60,80,100]
        (half-open intervals [min, max), last bin inclusive [min, max]).
        EXPLORATORY ONLY -- has look-ahead bias because future weeks
        contribute to the percentile thresholds. Source: msm_label.compute_labels_v0_0.
    - name: label_v0_1
      type: string
      enum: [Red, Orange, Yellow, YellowGreen, Green, null]
      definition: |
        ROLLING_PAST_52W percentile-bin label for F_tk. Same bin schema as v0_0
        but thresholds computed from prior 52 valid weeks only (PiT-safe).
        EMPTY in the historical CSV because the dataset only has 48 weeks --
        never reaches the 52-week minimum. Would populate if the strategy
        re-ran with >= 52 weeks of history. Source: msm_label.compute_labels_v0_1.
      gotchas:
        - "ALL ROWS NULL in current CSV. NOT a bug -- intentional NA when prior history < 52 weeks."
    - name: p_v0_0
      type: float
      unit: percentile_rank_0_to_100
      definition: |
        Percentile rank of F_tk within the FULL_SAMPLE distribution, on a
        0-100 scale (NOT 0-1). Has the same look-ahead caveat as label_v0_0.
        Source: msm_label.compute_percentile_rank.
    - name: p_v0_1
      type: float
      unit: percentile_rank_0_to_100
      definition: "Percentile rank within ROLLING_PAST_52W. Empty in historical CSV (same reason as label_v0_1)."
    - name: r_alts
      type: float
      unit: weekly_simple_return_decimal
      definition: |
        Equal-weight mean of per-alt simple arithmetic returns over
        [decision_date, next_date] using asof close pricing. Variance Shield:
        if n_valid_alts < 20 (out of 30 target), week is "aborted" and
        downstream y is forced to 0 (r_alts itself may be NaN in that case).
        Source: msm_returns.compute_returns.
    - name: r_maj_weighted
      type: float
      unit: weekly_simple_return_decimal
      definition: |
        Sum of weight_i * r_major_i over the configured majors (e.g.
        BTC weight 0.7 + ETH weight 0.3 in v0). NaN if any major is missing.
    - name: y
      type: float
      unit: weekly_return
      definition: |
        DOC vs DATA DIVERGENCE -- read carefully:
        * In the historical msm_timeseries.csv (paused 2024-12-30), y is the
          ARITHMETIC SPREAD: y = r_maj_weighted - r_alts. Verified empirically
          on every row to 12 decimals.
        * The CURRENT msm_returns.py code defines y = ln(1 + (r_maj_weighted - r_alts))
          (msm_returns.py:189) per the assumption ledger fix. The code was
          changed AFTER the strategy paused; if the strategy is re-run, y will
          shift from arithmetic-spread to log-spread.
        Negative y means the strategy LOST that week (alts beat majors); long
        majors / short alts is the implicit position.
      gotchas:
        - "If you see y in the CSV, treat as ARITHMETIC spread. If you re-run the strategy, expect LOG spread."
    - name: r_btc
      type: float
      unit: weekly_simple_return_decimal
      definition: "Simple return BTC over [decision_date, next_date], asof pricing."
    - name: r_eth
      type: float
      unit: weekly_simple_return_decimal
      definition: "Simple return ETH over [decision_date, next_date], asof pricing."
  known_consumers:
    - "Historical research notebooks under notebooks/"
    - "MSM equity curve generation (scripts/generate_equity_curve_comparison.py et al.)"
    - "External AI sessions reading msm_timeseries.csv from Drive"
  audit_trail_note: >
    The PiT audit trail (per-week run receipts, baskets, sensor snapshots)
