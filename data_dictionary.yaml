# 1. SILVER TABLES (Step 3.5: scripts/data_ingestion/build_silver_layer.py)
# ------------------------------------------------------------------------------

silver_fact_price:
  path: data/curated/data_lake/silver_fact_price.parquet
  source:
    derived_from: fact_price.parquet (CoinGecko bronze)
    builder: scripts/data_ingestion/build_silver_layer.py::build_silver_fact_price
  pipeline_step: "run_live_pipeline.py Step 3.5"
  status: ALIVE-DAILY
  primary_key: [asset_id, date]
  grain: daily UTC
  what_silver_adds:
    - "Blacklist drop (blacklist.csv)"
    - "Anomaly detection: 'Absolute Nuke', 'Standard Slingshot', 'Fat Slingshot' (T+2/T+3) -- price anomalies that flag an asset as winsorized at the affected dates"
    - "Continuous daily reindex per asset_id (asfreq('D')) so gaps are explicit NaN"
    - "is_winsorized flag added"
    - "is_ffilled flag added but NEVER set (always False on price -- see column note below). Only silver_fact_funding actually forward-fills."
  columns:
    - name: asset_id
      type: string
      definition: "Canonical CoinGecko slug (matches dim_asset.coingecko_id)."
    - name: date
      type: date
      unit: UTC_calendar_day
      frequency: daily
    - name: close
      type: float
      unit: USD_per_coin
      frequency: daily
      definition: "USD close. Cleaned via anomaly detection; blacklisted assets dropped."
      gotchas:
        - "Pre-2024 rows from the Analyst-tier era inherit the same suspect-quality caveat as bronze fact_price."
        - "is_winsorized=True rows have close set to NaN (anomaly-flagged)."
        - "Calendar-day reindex creates explicit NaN rows on missing days (not forward-filled). If you need a contiguous price series, you must ffill yourself downstream."
    - name: source
      type: string
      definition: "Provider tag; 'coingecko' for valid rows, NaN where winsorized."
    - name: is_winsorized
      type: bool
      definition: "True when the date was flagged by the anomaly detector (Absolute Nuke / Standard Slingshot / Fat Slingshot)."
    - name: is_ffilled
      type: bool
      definition: |
        ALWAYS FALSE on silver_fact_price. The column exists for schema parity
        with silver_fact_funding (which does ffill up to FFILL_LIMIT=3 days)
        but build_silver_fact_price has no `.ffill()` call -- verified
        2026-04-28 against scripts/data_ingestion/build_silver_layer.py.
        Reserved for a future price-gap-fill pass; do NOT mask on this flag
        expecting it to identify gap-filled rows. Earlier docs incorrectly
        described this as an active flag.
  known_consumers:
    - "Apathy Bleed monitoring (live mark-to-market joins)"
    - "MSM strategy returns (msm_returns.compute_returns reads silver prices)"
    - "single_coin_panel.csv generation"
    - "Analytical notebooks under notebooks/"

silver_fact_marketcap:
  path: data/curated/data_lake/silver_fact_marketcap.parquet
  source:
    derived_from: fact_marketcap.parquet (CoinGecko bronze) + silver_fact_price.parquet (for implied-supply detection)
    builder: scripts/data_ingestion/build_silver_layer.py::build_silver_fact_marketcap
  pipeline_step: "run_live_pipeline.py Step 3.5"
  status: ALIVE-DAILY
  primary_key: [asset_id, date]
  grain: daily UTC
  what_silver_adds:
    - "Blacklist drop"
    - "Continuous daily reindex per asset_id"
    - "Supply Slingshot detection: implied_supply = market_cap / silver_close. If implied_supply spikes >50% then crashes >33% within T+1..T+3, neutralize market_cap to NaN over the plateau (origin and crash days)."
    - "is_winsorized flag added"
  columns:
    - name: asset_id
      type: string
    - name: date
      type: date
      unit: UTC_calendar_day
    - name: market_cap
      type: float
      unit: USD
      frequency: daily
      definition: "Market cap, cleaned. Bronze 'marketcap' column renamed to 'market_cap' here."
      gotchas:
        - "NaN on Supply-Slingshot plateau dates (typically a CoinGecko upstream supply revision)."
        - "Pre-2024 rows inherit the suspect-quality caveat from bronze."
    - name: source
      type: string
    - name: is_winsorized
      type: bool
      definition: "True on Supply-Slingshot-affected dates."
  known_consumers:
    - "MSM universe selection (select_top_n_alts)"
    - "Apathy Bleed Gate 3 (OI/mcap) candidate scoring"
    - "Cross-sectional rank features in research notebooks"

silver_fact_funding:
  path: data/curated/data_lake/silver_fact_funding.parquet
  source:
    derived_from: fact_funding.parquet (CoinGlass bronze)
    builder: scripts/data_ingestion/build_silver_layer.py::build_silver_fact_funding
  pipeline_step: "run_live_pipeline.py Step 3.5"
  status: ALIVE-DAILY
  primary_key: [asset_id, instrument_id, exchange, date]
  grain: daily UTC, per (asset, instrument, exchange)
  what_silver_adds:
    - "Bronze 'funding_rate' column renamed to 'funding_rate_raw_pct'"
    - "Temporal harmonization: dates >= 2026-01-13 UTC are divided by 100 to convert percent units back to pure decimal. Result is uniform-decimal 8h funding."
    - "Per-(asset, instrument, exchange) sort"
    - "Asset coverage safeguard: raises if n_assets < 25 (sized for the Top-30 universe, now ~590 alts post-2026-04-22)"
    - "Continuous daily reindex per (asset_id, instrument_id, exchange); forward-fill up to FFILL_LIMIT=3 days for narrow gaps"
    - "is_ffilled and is_capped flags (is_capped is always False in current code -- reserved for future capping)"
    - "Pandera SCHEMA validation before write (SILVER_FUNDING_SCHEMA)"
  unit_invariant: |
    All rows are pure-decimal 8-hour funding rates regardless of bronze date.
    Annualization to APR uses x 1095 (= 365 days x 3 epochs/day). Convert to
    percent by additionally x 100.
  columns:
    - name: asset_id
      type: string
      definition: "Canonical base asset symbol (uppercase: BTC, ETH, ARIA, etc.)."
    - name: instrument_id
      type: string
      nullable: true
      definition: "Joins to dim_instrument; nullable when mapping is incomplete."
    - name: exchange
      type: string
      definition: "Exchange name (e.g. 'Binance')."
    - name: date
      type: date
      unit: UTC_calendar_day
      frequency: daily
    - name: funding_rate_raw_pct
      type: float
      unit: decimal_8h_fraction
      frequency: daily
      definition: |
        UNIFORM 8-hour funding rate as a pure decimal fraction
        (0.0001 = 0.01% per 8-hours = 0.10% per day = 36.5% APR).
        Bronze cutover is resolved here: pre-2026-01-13 values were already
        decimal; post-cutover values are bronze/100.
      gotchas:
        - "Despite the name '_raw_pct', the values are decimals (NOT percents). The suffix is an artifact of legacy naming."
        - "ALWAYS use this column, not bronze fact_funding.funding_rate, for any analysis."
    - name: source
      type: string
      definition: "'coinglass' for primary rows; NaN-then-ffilled rows inherit ffill source."
    - name: is_ffilled
      type: bool
      definition: "True when funding was forward-filled to bridge a <=3-day gap. Use to mask if you need only first-hand observations."
    - name: is_capped
      type: bool
      definition: "Reserved for future absolute-cap logic; always False in current code."
  known_consumers:
    - "build_silver_layer.py -> silver_funding_cross_sectional_daily (downstream silver/gold)"
    - "MSM strategy F_tk feature (compute_7d_mean_funding)"
    - "Funding-sensitive notebooks under notebooks/"
    - "Apathy Bleed Gate 4 (funding regime) -- under development"

silver_funding_cross_sectional_daily:
  path: data/curated/data_lake/silver_funding_cross_sectional_daily.parquet
  source:
    derived_from: silver_fact_funding.parquet
    builder: majors_alts_monitor/msm_funding_v0/macro_environment.py::build_daily_environment_table
    invoked_by: scripts/data_ingestion/build_silver_layer.py (Step 3.5)
  pipeline_step: "run_live_pipeline.py Step 3.5"
  status: ALIVE-DAILY
  primary_key: [date]            # single time series, NOT per-asset
  grain: daily UTC, single time series
  observed_2026_04_28:
    rows: 1105
    date_range: "2023-04-19 -> 2026-04-27"
  universe:
    description: |
      Cross-section is whatever's in silver_fact_funding -- by default the
      CoinGlass Binance-perp universe (~590 alts after the 2026-04-22 expansion;
      ~30 prior). NO explicit BTC exclusion. NO stablecoin filter. NO low-volume
      gate at this layer. The IQM aggregation (drops top/bottom n//4) provides
      robustness to outliers without an explicit filter.
    pre_aggregation:
      step: "_collapse_funding_to_asset_daily"
      definition: "For each (date, asset_id), MEAN of all 8h funding observations that day. Output: one harmonized rate per (date, asset_id)."
  columns:
    - name: date
      type: datetime
      unit: UTC_calendar_day
      frequency: daily
    - name: env_rate_dec
      type: float
      unit: decimal_8h_fraction
      frequency: daily
      definition: |
        Per-day TRUNCATED INTERQUARTILE MEAN (IQM) across the cross-section
        of asset-level harmonized 8h rates. Trim algorithm: sort rates, drop
        top n//4 and bottom n//4, return mean of the middle. NaN if n=0;
        plain mean if n//4 == 0.
      gotchas:
        - "Pure-decimal 8h units. Multiply by 1095*100 to compare to Environment_APR_daily_pct."
    - name: Environment_APR_daily_pct
      type: float
      unit: percentage_points_APR
      frequency: daily
      definition: |
        env_rate_dec * 1095 * 100. Annualization assumes 3 funding epochs
        per day x 365 days/year. Output is in PERCENTAGE POINTS (e.g. 4.0 = 4%
        APR), so it can be compared directly to threshold constants like
        ENVIRONMENT_APR_ENTRY_GATE_PCT in src/macro_regime/gate_policy.py.
      gotchas:
        - "Despite the column name 'daily_pct', this is an ANNUALIZED APR sampled daily. Naming is historical."
    - name: Fragmentation_Spread
      type: float
      unit: decimal_8h_fraction
      frequency: daily
      definition: |
        Per-day q75 - q25 of the asset-level harmonized 8h rates (the same
        cross-section used for env_rate_dec, BEFORE the IQM trim). Quantile
        method: NAIVE INDEX -- specifically:
            q25 = rates[int(n * 0.25)]
            q75 = rates[int(n * 0.75)]
            spread = q75 - q25
        (the slash separator in earlier docs read like division -- it was
        meant as a list separator). NOT interpolated. Returns NaN when
        n_assets < 4 that day. Pure-decimal 8h units (matches
        src/macro_regime/gate_policy.py contract:
        FRAGMENTATION_IDIOSYNCRATIC_TOXIC_CEILING is on the same scale).
      gotchas:
        - "Same scale as env_rate_dec (decimal 8h), NOT annualized."
        - "Naive-index quantile means small basket sizes can give jumpy spreads."
    - name: Z_Score_90d
      type: float
      unit: zscore
      frequency: daily
      definition: |
        Rolling 90-day z-score of Environment_APR_daily_pct (NOT env_rate_dec).
        Window=90, min_periods=30. First 29 rows after a fresh start are NaN
        -- the 30th row (index 29) is the first non-null because min_periods=30
        means a value is emitted as soon as 30 prior observations including
        itself are available. Verified empirically against the live parquet
        2026-04-28: rows 0..28 are NaN, index 29 (date 2023-05-18) is the
        first non-null. Formula: (s - rolling_mean) / rolling_std.
  known_consumers:
    - "General Regime Monitor / 3-Factor Gate (src/macro_regime/gate_policy.py)"
    - "MSM strategy weekly_lookback_means (when the strategy is active)"
    - "Dashboard regime stance computation"
    - "Paused MSM strategy used to consume Environment_APR_daily_pct + Fragmentation_Spread; the daily macro feed is still alive even though the weekly strategy is paused."

