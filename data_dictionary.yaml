# Master Data Dictionary: MSM Funding Pipeline + Curated Price Panels
# Machine-readable source of truth for column semantics.

layers:
  bronze:
    description: "Raw data ingestion layer."
    columns:
      - name: funding_rate_raw_pct
        type: float
        unit: decimal  # Example: 0.000186 means 0.0186% per 8-hours
        frequency: 8-hour
        source: coinglass_api

  silver:
    description: "Cleaned and standardized layer."
    columns:
      - name: funding_rate_raw_pct
        type: float
        unit: decimal  # Example: 0.000186 means 0.0186% per 8-hours
        frequency: 8-hour
        transformation: "Bronze column funding_rate renamed to funding_rate_raw_pct. Temporal harmonization applied due to an upstream unit shift (cutover 2026-01-13 UTC): before cutover values treated as decimals; at/after cutover values are divided by 100 to convert percent-units into decimals."

  gold:
    description: "Feature engineering and strategy engine layer."
    columns:
      - name: F_tk_apr_dec
        type: float
        unit: decimal # Example: 0.04 (representing 4.0% APR)
        frequency: annualized
        pipeline_column: "F_tk_apr"  # msm_timeseries.csv: decimal APR (not percentage points)
      - name: Environment_APR
        type: float
        unit: percentage_points  # Example: 4.0 means 4% APR (stored as pct-points)
        frequency: decision_date (weekly decision points)
        definition: "Weekly Environment_APR derived from the macro environment sensor; stored in percentage points so it can be compared directly to APR thresholds like 2.0 / 5.0 / 15.0."
      - name: Fragmentation_Spread
        type: float
        unit: decimal_raw  # Example: 0.000075 means 7.5e-5 (a pure decimal fraction; no percent scaling)
        frequency: decision_date (weekly decision points)
        definition: "Cross-sectional funding-rate spread (q75 - q25) computed from native 8-hour funding rates across the altcoin basket; values are stored as raw decimals (no % multipliers/dividers)."

prices_daily:
  close:
    dtype: float64
    unit: USD
    definition: "Quote currency is USD. Close price represents USD per unit of base asset."
  volume:
    dtype: float64
    unit: USD
    definition: "Represents 24-hour rolling quote volume expressed in USD."
  date:
    frequency: Daily
    definition: "Daily bars closing at 00:00 UTC. Any naive datetime index must be localized to UTC. Missing calendar days are to be treated as pipeline ingestion gaps, not expected exchange pauses."

Live_State_Database:
  engine: SQLite
  file: macro_state.db
  primary_table: macro_features
  primary_key: decision_date (Must be strictly indexed for fast UPSERTs and UI reads)
  write_protocol: UPSERT only. Destructive overwrites are forbidden.

System_Time:
  timezone: UTC
  cron_offsets: +5 minutes past the 8-hour epoch (e.g., 08:05) to ensure exchange API settlement.

# ------------------------------------------------------------------------------
# Apathy Bleed (pair trade book + read-only monitoring)
# All paths under data/curated/data_lake/ unless noted. UTC calendar dates for *_date_utc columns.
# ------------------------------------------------------------------------------
Apathy_Bleed:
  description: >
    Manual trade ledger for Long BTC / Short alt (Apathy Bleed). The book CSV is the source of truth;
    there is no execution API. Monitoring joins the book to Variational public GET /metadata/stats mark prices.
  config_file:
    path: configs/apathy_alerts.yaml
    definition: "Thresholds (warning/critical/stop fractions, hold_days, scan milestones, Variational URL); strategy parameters are not hardcoded in Python."

  apathy_bleed_book_csv:
    path: data/curated/data_lake/apathy_bleed_book.csv
    write_protocol: >
      Append new legs; closing a trade rewrites the matching row in place (status, exit fields, PnL).
      Rows are never deleted (append-only audit of lifecycle).
    columns:
      - name: trade_id
        type: string
        unit: uuid
        definition: "Unique row identifier."
      - name: cohort
        type: string
        definition: "Cohort label (e.g. C1, C2, TEST)."
      - name: ticker
        type: string
        definition: "Base symbol as used for Variational mark lookup (e.g. ZEC, BTC for LONG_BTC leg)."
      - name: side
        type: string
        definition: "SHORT (alt leg) or LONG_BTC (hedge)."
      - name: entry_date_utc
        type: date
        unit: UTC_calendar_day
      - name: entry_price_usd
        type: float
        unit: USD_per_coin
      - name: notional_usd
        type: float
        unit: USD
        definition: "Notional sized at entry (short leg notional; LONG_BTC row matches sum of cohort short notionals at hedge time)."
      - name: quantity
        type: float
        unit: coins
        definition: "notional_usd / entry_price_usd."
      - name: stop_price_usd
        type: float
        unit: USD_per_coin
        definition: "SHORT legs: entry_price_usd * 1.60. LONG_BTC may be blank."
      - name: exit_date_target_utc
        type: date
        unit: UTC_calendar_day
        definition: "entry_date_utc + hold_days (default from config)."
      - name: status
        type: string
        definition: "OPEN | CLOSED_EXPIRY | CLOSED_STOP | CLOSED_MANUAL."
      - name: exit_date_utc
        type: date
        unit: UTC_calendar_day
        nullable: true
      - name: exit_price_usd
        type: float
        unit: USD_per_coin
        nullable: true
      - name: pnl_usd
        type: float
        unit: USD
        nullable: true
        definition: "pnl_pct * notional_usd at close."
      - name: pnl_pct
        type: float
        unit: decimal_fraction
        nullable: true
        definition: "SHORT: (entry - exit) / entry. LONG_BTC: (exit - entry) / entry."
      - name: notes
        type: string
        nullable: true

  apathy_alert_log_csv:
    path: data/curated/data_lake/apathy_alert_log.csv
    write_protocol: "Append-only audit of Telegram alerts emitted by scripts/apathy_alert_runner.py."
    columns:
      - name: timestamp_utc
        type: string
        definition: "ISO-8601 UTC from datetime.now(timezone.utc)."
      - name: alert_type
        type: string
      - name: trade_id
        type: string
        nullable: true
      - name: cohort
        type: string
        nullable: true
      - name: ticker
        type: string
        nullable: true
      - name: dedup_bucket
        type: string
        definition: "Key used for de-duplication (e.g. UTC hour + tier, or snapshot day)."
      - name: message
        type: string
        definition: "Single-line text copy of alert body."

  apathy_monitoring_state_json:
    description: "Small JSON sidecars for deduplication and daily bundle bookkeeping (not human trade data)."
    files:
      - path: data/curated/data_lake/apathy_stop_proximity_state.json
        definition: "Last adverse tier per OPEN short trade_id; hourly per-tier send markers."
      - path: data/curated/data_lake/apathy_exit_reminder_state.json
        definition: "Keys for exit-date reminders already sent."
      - path: data/curated/data_lake/apathy_scanner_reminder_state.json
        definition: "Scanner milestone sends per UTC day."
      - path: data/curated/data_lake/apathy_daily_snapshot_state.json
        definition: "Last daily snapshot UTC day."
      - path: data/curated/data_lake/apathy_daily_bundle_state.json
        definition: "Last UTC day the 08:00 bundle (exit + scanner + snapshot) ran."
