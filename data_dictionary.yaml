#
# Format follows the schema in CLAUDE_CODE_BRIEFING.md §4.1: every column
# entry has type, unit, frequency, definition, gotchas. Tables high-touch
# enough to deserve full per-column docs are at the top; lower-traffic
# dim_* / map_* tables get one-paragraph stubs.
