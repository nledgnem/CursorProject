# MSM + BTCDOM analysis (standalone under BTCDOM exercise)
# Paths are relative to this config file or can be overridden via CLI.

# Path to BTCDOM reconstruction output (timestamp, btcdom_recon, ...)
recon_path: "../recon.csv"

# Default path to MSM v0 timeseries (override with --timeseries-csv)
# Example: "../../reports/msm_funding_v0/msm_v0_2024_02_to_2026_01/msm_timeseries.csv"
timeseries_path: ""

# Output directory for joined CSV and reports (relative to msm_btcdom/)
out_dir: "out"

# Optional gating defaults (used when --gate is passed without explicit mode/threshold)
btcdom_gate:
  enabled: false
  # One of: above, below, between
  mode: "above"
  threshold: 4000.0
  # For mode "between" only:
  # threshold_low: 3500.0
  # threshold_high: 5500.0
